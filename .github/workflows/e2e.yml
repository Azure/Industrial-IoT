name: E2E
# End-to-end tests for OPC Publisher, runnable from GitHub Actions against a real
# Azure subscription. Opt-in per PR by applying the "e2e" label (avoids spending money
# on every push). Also runnable nightly against main, or manually via workflow_dispatch.
#
# Authentication: federated identity only. The `azure/login` action exchanges the
# GitHub OIDC token for an Azure AAD access token. The Service Principal subject
# 'repo:Azure/Industrial-IoT:environment:e2e' must be configured as a Federated
# Credential on a Service Principal that has Contributor on the test subscription
# and the data-plane roles granted by tools/e2etesting/bicep/main.bicep.
#
# Required repository variables (non-secret):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
# Required environment: `e2e` (configure required reviewers under repo Settings →
# Environments → e2e so non-maintainers can't trigger costly runs).

on:
  pull_request:
    types: [labeled, synchronize]
    branches: [main]
  schedule:
    # 04:00 UTC daily regression against main.
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      cleanup:
        description: 'Delete the resource group after the run.'
        type: boolean
        default: true
      resourceGroup:
        description: 'Existing resource group to reuse (skips deploy). Leave blank for a fresh deploy.'
        type: string
        default: ''

# Cancel previous runs for the same PR if a new commit/label arrives.
concurrency:
  group: e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write   # for azure/login OIDC
  contents: read

jobs:
  guard:
    # Skip pull_request runs that don't have the `e2e` label. Always run on schedule
    # or workflow_dispatch.
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - id: gate
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'e2e') }}" == "true" ]]; then
              echo "run=true" >> "$GITHUB_OUTPUT"
            else
              echo "run=false" >> "$GITHUB_OUTPUT"
              echo "e2e label not present; skipping."
            fi
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    environment: e2e   # requires reviewer approval for cost control
    outputs:
      resource_group: ${{ steps.rg.outputs.name }}
      iot_hub_hostname: ${{ steps.deploy.outputs.iotHubHostname }}
      eh_namespace: ${{ steps.deploy.outputs.iotHubEventHubNamespace }}
      eh_name: ${{ steps.deploy.outputs.iotHubEventHubName }}
      kv_name: ${{ steps.deploy.outputs.keyVaultName }}
      acr_login_server: ${{ steps.deploy.outputs.acrLoginServer }}
      test_suffix: ${{ steps.rg.outputs.suffix }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - id: rg
        name: Resolve target resource group
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.resourceGroup }}" ]; then
            RG="${{ github.event.inputs.resourceGroup }}"
            SUFFIX="$(az group show -n "$RG" --query 'tags.TestingResourcesSuffix' -o tsv)"
            echo "Reusing existing RG '$RG' with suffix '$SUFFIX'."
          else
            SUFFIX="$(( RANDOM % 90000 + 10000 ))"
            SHORTSHA="${GITHUB_SHA::8}"
            RG="rg-iiot-e2e-${GITHUB_RUN_ID}-${SHORTSHA}"
            echo "Creating new RG '$RG' with suffix '$SUFFIX'."
            az group create -n "$RG" -l eastus --tags `
              "owner=github-actions" `
              "TestingResourcesSuffix=$SUFFIX" `
              "GitHubRunId=$GITHUB_RUN_ID" `
              "GitHubPr=${{ github.event.pull_request.number }}" `
              "CreatedAt=$(date -u +%Y-%m-%dT%H:%M:%SZ)" > /dev/null
          fi
          echo "name=$RG" >> "$GITHUB_OUTPUT"
          echo "suffix=$SUFFIX" >> "$GITHUB_OUTPUT"

      - id: deploy
        name: Deploy test resources via Bicep
        shell: bash
        run: |
          OUT=$(az deployment group create \
            --resource-group "${{ steps.rg.outputs.name }}" \
            --template-file tools/e2etesting/bicep/main.bicep \
            --parameters testSuffix=${{ steps.rg.outputs.suffix }} \
                         testServicePrincipalObjectId=${{ vars.AZURE_CLIENT_ID }} \
            --query 'properties.outputs' -o json)
          echo "$OUT"
          # Surface each output as a step output (jq parses .value.value).
          for k in iotHubHostname iotHubEventHubNamespace iotHubEventHubName keyVaultName acrLoginServer; do
            v=$(echo "$OUT" | jq -r ".$k.value")
            echo "$k=$v" >> "$GITHUB_OUTPUT"
          done

      - name: Post-deploy verification
        shell: pwsh
        run: |
          tools/e2etesting/VerifyDeployment.ps1 -ResourceGroupName "${{ steps.rg.outputs.name }}"

  test:
    needs: deploy
    runs-on: ubuntu-latest
    environment: e2e
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Restore + build e2e tests
        run: |
          dotnet restore e2e-tests/IIoTPlatform-E2E-Tests.slnx -s https://api.nuget.org/v3/index.json
          dotnet build e2e-tests/IIoTPlatform-E2E-Tests.slnx --no-restore -c Release

      - name: Run e2e tests
        timeout-minutes: 60
        env:
          # Federated credential. AzurePipelinesCredential in TestHelper picks these up
          # when SYSTEM_ACCESSTOKEN is unset (which it is on GitHub Actions) and falls
          # through to DefaultAzureCredential, which picks up the azure/login session.
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          # Test-resource pointers from the deploy job.
          PCS_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          PCS_RESOURCE_GROUP: ${{ needs.deploy.outputs.resource_group }}
          PCS_AUTH_TENANT: ${{ vars.AZURE_TENANT_ID }}
          IOTHUB_HOSTNAME: ${{ needs.deploy.outputs.iot_hub_hostname }}
          IOTHUB_EVENTHUB_NAMESPACE: ${{ needs.deploy.outputs.eh_namespace }}
          IOTHUB_EVENTHUB_NAME: ${{ needs.deploy.outputs.eh_name }}
        run: |
          dotnet test e2e-tests/IIoTPlatform-E2E-Tests.slnx \
            --no-build -c Release \
            --filter 'PublisherMode=AE' \
            --logger 'trx;LogFileName=e2e.trx' \
            --results-directory TestResults \
            --blame-hang-timeout 30m \
            --blame-hang-dump-type none

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-trx-${{ github.run_id }}
          path: '**/TestResults/**/*.trx'
          if-no-files-found: warn
          retention-days: 14

  cleanup:
    needs: [deploy, test]
    # Always run after deploy regardless of test pass/fail, unless the user opted out
    # via workflow_dispatch.
    if: always() && needs.deploy.result == 'success' && (github.event_name != 'workflow_dispatch' || github.event.inputs.cleanup == 'true')
    runs-on: ubuntu-latest
    environment: e2e
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Delete resource group (async)
        shell: bash
        run: |
          RG="${{ needs.deploy.outputs.resource_group }}"
          if [ -z "$RG" ]; then exit 0; fi
          # Refuse to delete if DoNotDelete tag is set (developer kept it for repro).
          DND=$(az group show -n "$RG" --query 'tags.DoNotDelete' -o tsv 2>/dev/null || echo "")
          if [ "$DND" = "true" ]; then
            echo "Resource group $RG has DoNotDelete=true; leaving it alone."
            exit 0
          fi
          az group delete -n "$RG" --yes --no-wait
