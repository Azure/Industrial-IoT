name: E2E GC
# Daily garbage collector for stale e2e test resource groups. The E2E chain
# (ci.yml -> images_push -> e2e-standalone.yml) deletes its RG on success, but a
# hard crash, OOM, or a network blip during cleanup can leave the RG orphaned and
# burning money. This catches those.
#
# Heuristic: delete any RG whose name starts with `e2etesting` (the auto-generated
# `e2etesting<YYYYMMDD><run_id>` pattern created by e2e-standalone.yml) whose
# embedded date is older than a 24h cutoff, unless it carries a DoNotDelete=true tag.

on:
  schedule:
    # 03:00 UTC daily (1h before the nightly e2e regression run).
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  gc:
    runs-on: ubuntu-latest
    environment: e2e
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Collect stale e2e resource groups
        shell: bash
        run: |
          set -eu
          # RGs are named e2etesting<YYYYMMDD><run_id> by e2e-standalone.yml's init
          # job and are tagged only with TestingResourcesSuffix (no CreatedAt tag),
          # so derive age from the date embedded in the name. Delete anything whose
          # date is older than the 24h cutoff unless it carries DoNotDelete=true.
          CUTOFF=$(date -u -d '24 hours ago' +%Y%m%d)
          echo "Deleting e2etesting* RGs whose embedded date is before $CUTOFF (unless DoNotDelete=true)..."

          RGS=$(az group list \
            --query "[?starts_with(name, 'e2etesting')].{name:name, tags:tags}" \
            -o json)

          echo "$RGS" | jq -c '.[]' | while read -r rg; do
            NAME=$(echo "$rg" | jq -r .name)
            DND=$(echo "$rg" | jq -r '.tags.DoNotDelete // ""')
            if [ "$DND" = "true" ]; then
              echo "SKIP: $NAME (DoNotDelete=true)"
              continue
            fi
            # Extract the 8-digit date that follows the 'e2etesting' prefix.
            REST=${NAME#e2etesting}
            RGDATE=${REST:0:8}
            if ! printf '%s' "$RGDATE" | grep -Eq '^[0-9]{8}$'; then
              echo "SKIP: $NAME (no parseable date in name)"
              continue
            fi
            if [ "$RGDATE" -lt "$CUTOFF" ]; then
              echo "DELETE: $NAME (date $RGDATE < cutoff $CUTOFF)"
              az group delete -n "$NAME" --yes --no-wait || true
            else
              echo "KEEP: $NAME (date $RGDATE >= cutoff $CUTOFF)"
            fi
          done
