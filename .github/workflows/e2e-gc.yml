name: E2E GC
# Daily garbage collector for stale e2e test resource groups. The E2E chain
# (ci.yml -> images_push -> e2e-standalone.yml) deletes its RG on success, but a
# hard crash, OOM, or a network blip during cleanup can leave the RG orphaned and
# burning money. This catches those.
#
# Heuristic: delete any RG whose name starts with `rg-iiot-e2e-` AND that was created
# more than 24 hours ago AND that doesn't have the DoNotDelete=true tag.

on:
  schedule:
    # 03:00 UTC daily (1h before the nightly e2e regression run).
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  gc:
    runs-on: ubuntu-latest
    environment: e2e
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Collect stale e2e resource groups
        shell: bash
        run: |
          set -eu
          CUTOFF=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          echo "Looking for rg-iiot-e2e-* RGs created before $CUTOFF without DoNotDelete=true tag..."

          # az resource list does not directly support RG-level creation time filtering,
          # so we list and filter client-side.
          RGS=$(az group list \
            --query "[?starts_with(name, 'rg-iiot-e2e-')].{name:name, tags:tags}" \
            -o json)

          echo "$RGS" | jq -c '.[]' | while read -r rg; do
            NAME=$(echo "$rg" | jq -r .name)
            DND=$(echo "$rg" | jq -r '.tags.DoNotDelete // ""')
            CREATED=$(echo "$rg" | jq -r '.tags.CreatedAt // ""')
            if [ "$DND" = "true" ]; then
              echo "SKIP: $NAME (DoNotDelete=true)"
              continue
            fi
            if [ -z "$CREATED" ]; then
              # No CreatedAt tag — be conservative, skip. This avoids deleting RGs
              # created out-of-band.
              echo "SKIP: $NAME (no CreatedAt tag)"
              continue
            fi
            if [[ "$CREATED" < "$CUTOFF" ]]; then
              echo "DELETE: $NAME (created $CREATED, cutoff $CUTOFF)"
              az group delete -n "$NAME" --yes --no-wait || true
            else
              echo "KEEP: $NAME (created $CREATED is newer than cutoff)"
            fi
          done
